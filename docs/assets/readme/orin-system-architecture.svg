<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ORIN system architecture</title>
  <desc id="desc">Three-layer architecture with Vue admin console, Spring Boot backend, FastAPI AI engine, and infrastructure dependencies.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF6FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 2 2 L 10 6 L 2 10 z" fill="#475569"/>
    </marker>
    <style>
      .title{font:700 34px Inter,Arial,sans-serif;fill:#0F172A}
      .sub{font:500 16px Inter,Arial,sans-serif;fill:#475569}
      .label{font:700 20px Inter,Arial,sans-serif;fill:#0F172A}
      .meta{font:500 14px Inter,Arial,sans-serif;fill:#64748B}
      .chip{font:700 13px Inter,Arial,sans-serif;fill:#334155}
      .line{stroke:#475569;stroke-width:2.4;marker-end:url(#arrow)}
      .soft{stroke:#CBD5E1;stroke-width:1.2}
    </style>
  </defs>
  <rect width="1200" height="680" rx="32" fill="url(#bg)"/>
  <text x="60" y="72" class="title">ORIN Architecture</text>
  <text x="60" y="104" class="sub">Business control in Java, execution in Python, operations through a Vue admin console.</text>

  <rect x="60" y="150" width="300" height="150" rx="18" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="82" y="174" width="56" height="56" rx="14" fill="#DBEAFE"/>
  <path d="M104 214h25M104 200h33M104 186h21" stroke="#2563EB" stroke-width="5" stroke-linecap="round"/>
  <text x="158" y="191" class="label">Vue 3 Console</text>
  <text x="158" y="219" class="meta">Agent workspace, workflow editor,</text>
  <text x="158" y="241" class="meta">collaboration board, API keys</text>
  <rect x="82" y="258" width="77" height="24" rx="12" fill="#EFF6FF"/>
  <text x="100" y="275" class="chip">Frontend</text>

  <rect x="450" y="118" width="300" height="214" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="472" y="144" width="56" height="56" rx="14" fill="#DCFCE7"/>
  <path d="M500 158v28M486 172h28M492 194h16" stroke="#16A34A" stroke-width="5" stroke-linecap="round"/>
  <text x="548" y="162" class="label">Spring Boot Backend</text>
  <text x="548" y="190" class="meta">Single source of business data</text>
  <text x="548" y="212" class="meta">Auth, audit, gateway, trace</text>
  <text x="548" y="234" class="meta">Agent / workflow / collaboration APIs</text>
  <rect x="472" y="268" width="63" height="24" rx="12" fill="#F0FDF4"/>
  <text x="490" y="285" class="chip">Java</text>
  <rect x="544" y="268" width="86" height="24" rx="12" fill="#F0FDF4"/>
  <text x="562" y="285" class="chip">Gateway</text>

  <rect x="840" y="150" width="300" height="150" rx="18" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="862" y="174" width="56" height="56" rx="14" fill="#FCE7F3"/>
  <path d="M890 184c-12 0-20 8-20 20 0 8 5 15 12 18M890 184c12 0 20 8 20 20 0 8-5 15-12 18M890 184v42" stroke="#DB2777" stroke-width="4.6" stroke-linecap="round"/>
  <text x="938" y="191" class="label">FastAPI AI Engine</text>
  <text x="938" y="219" class="meta">Workflow DSL runner, LangGraph,</text>
  <text x="938" y="241" class="meta">MQ worker, TaskRuntime</text>
  <rect x="862" y="258" width="82" height="24" rx="12" fill="#FDF2F8"/>
  <text x="880" y="275" class="chip">Python</text>

  <line x1="360" y1="225" x2="442" y2="225" class="line"/>
  <line x1="750" y1="225" x2="832" y2="225" class="line"/>

  <rect x="72" y="402" width="1048" height="164" rx="22" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="104" y="444" class="label">Runtime and data plane</text>
  <line x1="104" y1="466" x2="1088" y2="466" class="soft"/>

  <g>
    <rect x="108" y="496" width="148" height="42" rx="14" fill="#E0F2FE"/>
    <text x="145" y="523" class="chip">MySQL</text>
    <rect x="282" y="496" width="148" height="42" rx="14" fill="#FEF3C7"/>
    <text x="318" y="523" class="chip">Redis</text>
    <rect x="456" y="496" width="148" height="42" rx="14" fill="#FFEDD5"/>
    <text x="492" y="523" class="chip">RabbitMQ</text>
    <rect x="630" y="496" width="148" height="42" rx="14" fill="#EDE9FE"/>
    <text x="668" y="523" class="chip">Milvus</text>
    <rect x="804" y="496" width="148" height="42" rx="14" fill="#DCFCE7"/>
    <text x="831" y="523" class="chip">LLM Provider</text>
    <rect x="978" y="496" width="110" height="42" rx="14" fill="#FCE7F3"/>
    <text x="1009" y="523" class="chip">MCP</text>
  </g>

  <path d="M600 332v56" class="line"/>
  <path d="M990 300v70c0 21-17 38-38 38H662" stroke="#475569" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text x="430" y="620" class="sub">/v1 for API Key clients · /api/v1 for JWT business APIs · /api/workflows for workflow management</text>
</svg>
