<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ORIN execution and observability flow</title>
  <desc id="desc">Workflow and collaboration execution with trace propagation, audit logs, CI, smoke tests, and security checks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F7FEE7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 2 2 L 10 6 L 2 10 z" fill="#475569"/>
    </marker>
    <style>
      .title{font:700 34px Inter,Arial,sans-serif;fill:#0F172A}
      .sub{font:500 16px Inter,Arial,sans-serif;fill:#475569}
      .label{font:700 19px Inter,Arial,sans-serif;fill:#0F172A}
      .meta{font:500 14px Inter,Arial,sans-serif;fill:#64748B}
      .chip{font:700 13px Inter,Arial,sans-serif;fill:#334155}
      .line{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .thin{stroke:#CBD5E1;stroke-width:1.2}
    </style>
  </defs>
  <rect width="1200" height="620" rx="32" fill="url(#bg)"/>
  <text x="60" y="74" class="title">Execution and Observability</text>
  <text x="60" y="106" class="sub">Every executable request is designed to carry trace context across backend, queue, engine, audit, and smoke verification.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="174" width="180" height="118" rx="20" fill="#FFFFFF"/>
    <text x="103" y="216" class="label">Request</text>
    <text x="103" y="245" class="meta">Agent chat</text>
    <text x="103" y="267" class="meta">Workflow run</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="310" y="174" width="180" height="118" rx="20" fill="#FFFFFF"/>
    <text x="345" y="216" class="label">Backend</text>
    <text x="345" y="245" class="meta">Auth · audit</text>
    <text x="345" y="267" class="meta">traceparent</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="550" y="174" width="180" height="118" rx="20" fill="#FFFFFF"/>
    <text x="589" y="216" class="label">Queue</text>
    <text x="589" y="245" class="meta">RabbitMQ</text>
    <text x="589" y="267" class="meta">idempotency</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="790" y="174" width="180" height="118" rx="20" fill="#FFFFFF"/>
    <text x="823" y="216" class="label">AI Engine</text>
    <text x="823" y="245" class="meta">LangGraph</text>
    <text x="823" y="267" class="meta">TaskRuntime</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1030" y="174" width="100" height="118" rx="20" fill="#FFFFFF"/>
    <text x="1055" y="216" class="label">Result</text>
    <text x="1051" y="245" class="meta">state</text>
    <text x="1051" y="267" class="meta">trace</text>
  </g>

  <path d="M250 233h52" class="line"/>
  <path d="M490 233h52" class="line"/>
  <path d="M730 233h52" class="line"/>
  <path d="M970 233h52" class="line"/>

  <rect x="112" y="372" width="976" height="132" rx="22" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="150" y="414" class="label">Engineering feedback loop</text>
  <line x1="150" y1="434" x2="1050" y2="434" class="thin"/>
  <rect x="150" y="458" width="130" height="32" rx="16" fill="#DBEAFE"/>
  <text x="180" y="479" class="chip">CI</text>
  <rect x="302" y="458" width="130" height="32" rx="16" fill="#DCFCE7"/>
  <text x="326" y="479" class="chip">CodeQL</text>
  <rect x="454" y="458" width="130" height="32" rx="16" fill="#FEF3C7"/>
  <text x="476" y="479" class="chip">Gitleaks</text>
  <rect x="606" y="458" width="130" height="32" rx="16" fill="#FCE7F3"/>
  <text x="625" y="479" class="chip">Coverage</text>
  <rect x="758" y="458" width="130" height="32" rx="16" fill="#EDE9FE"/>
  <text x="786" y="479" class="chip">Smoke</text>
  <rect x="910" y="458" width="140" height="32" rx="16" fill="#E0F2FE"/>
  <text x="936" y="479" class="chip">Docs</text>

  <path d="M400 292 C400 335 260 335 220 366" class="line"/>
  <path d="M880 292 C880 336 960 334 978 366" class="line"/>
  <text x="362" y="552" class="sub">Business smoke · MCP open demo smoke · Docker runtime smoke · trace summary checks</text>
</svg>
