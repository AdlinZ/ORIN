services:
  mysql:
    image: mysql:8.0.40
    container_name: orin-mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Copy .env.example to .env and set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?Copy .env.example to .env and set MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER:?Copy .env.example to .env and set MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Copy .env.example to .env and set MYSQL_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - orin-mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - orin-network

  redis:
    image: redis:7.4-alpine
    container_name: orin-redis
    env_file:
      - .env
    command: >
      sh -c 'redis-server
      --appendonly yes
      --requirepass "$${REDIS_PASSWORD}"'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Copy .env.example to .env and set REDIS_PASSWORD}
    volumes:
      - orin-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - orin-network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: orin-rabbitmq
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-orin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-replace_with_local_rabbitmq_password}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/orin}
    volumes:
      - orin-rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - orin-network

  orin-ai-engine:
    image: orin-ai-engine:local
    container_name: orin-ai-engine
    build:
      context: ./orin-ai-engine
      dockerfile: ../docker/Dockerfile.ai-engine
      target: runtime
    env_file:
      - .env
    environment:
      ORIN_BACKEND_URL: http://orin-backend:8080
      ORIN_BACKEND_AUTHORIZATION: ${ORIN_BACKEND_AUTHORIZATION:-}
      ORIN_REDIS_URL: redis://:${REDIS_PASSWORD:?Copy .env.example to .env and set REDIS_PASSWORD}@redis:6379/0
      ORIN_RABBITMQ_URL: ${ORIN_RABBITMQ_URL:-}
      ORIN_MQ_WORKER_DISABLED: ${ORIN_MQ_WORKER_DISABLED:-true}
      ORIN_MQ_WORKER_AUTO_START: ${ORIN_MQ_WORKER_AUTO_START:-false}
      # OTel（Phase 2 小刀 5a/5b/5c）：OTLP HTTP exporter → jaeger。
      # - 5a/5b 引入 opentelemetry-api/sdk/exporter-otlp-proto-http（1.42.x）
      # - 5b 切换 propagator / 业务 span 影子化
      # - 5c 加 jaeger service，HTTP 4318 与 Python SDK 默认对齐（CI / docker bridge
      #   更稳，gRPC 4317 留给后端 Java）。`ORIN_TRACING_ENABLED=true` 启用。
      OTEL_SERVICE_NAME: orin-ai-engine
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      ORIN_TRACING_ENABLED: ${ORIN_TRACING_ENABLED:-true}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started
    ports:
      - "${AI_ENGINE_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 9
      start_period: 20s
    restart: unless-stopped
    networks:
      - orin-network

  orin-backend:
    image: orin-backend:local
    container_name: orin-backend
    build:
      context: ./orin-backend
      dockerfile: ../docker/Dockerfile.backend
      target: runtime
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:?Copy .env.example to .env and set MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER:?Copy .env.example to .env and set MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD:?Copy .env.example to .env and set MYSQL_PASSWORD}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Copy .env.example to .env and set REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?Copy .env.example to .env and set JWT_SECRET}
      ORIN_SECURITY_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Copy .env.example to .env and set CORS_ALLOWED_ORIGINS}
      ORIN_DEFAULT_ADMIN_PASSWORD: ${ORIN_DEFAULT_ADMIN_PASSWORD:?Copy .env.example to .env and set ORIN_DEFAULT_ADMIN_PASSWORD}
      ORIN_AI_ENGINE_URL: http://orin-ai-engine:8000
      MILVUS_HOST: ${MILVUS_HOST:-localhost}
      MILVUS_PORT: ${MILVUS_PORT:-19530}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-orin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-replace_with_local_rabbitmq_password}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/orin}
      ORIN_RABBITMQ_LISTENERS_AUTO_STARTUP: "true"
      COLLAB_LISTENERS_AUTO_STARTUP: ${COLLAB_LISTENERS_AUTO_STARTUP:-false}
      COLLAB_MODE: ${COLLAB_MODE:-JAVA_NATIVE}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      # OTel（Phase 2 小刀 5c）：OTLP gRPC exporter → jaeger。
      # - 后端 Java 用 opentelemetry 1.32.0 + gRPC OTLP（pom.xml 已加）
      # - 4317 gRPC 与 Java 默认对齐；4318 HTTP 留给 Python AI Engine
      # - OTEL_SERVICE_NAME 需与 OpenTelemetryConfig.java Resource 默认值
      #   `orin-backend` 对齐
      OTEL_SERVICE_NAME: orin-backend
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      ORIN_TRACING_ENABLED: ${ORIN_TRACING_ENABLED:-true}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 9
      start_period: 45s
    restart: unless-stopped
    networks:
      - orin-network

  # Jaeger all-in-one（Phase 2 小刀 5c：OTel/Jaeger 运行态联调）
  # - 16686: Jaeger UI（http://localhost:16686 选 service 查 trace）
  # - 4317: OTLP gRPC（与后端 Java OTel 默认对齐）
  # - 4318: OTLP HTTP（AI Engine Python OTel 默认对齐，HTTP exporter 更稳）
  # COLLECTOR_OTLP_ENABLED=true 显式开启 OTLP receiver（all-in-one 默认开，
  # 但 1.62 起部分镜像要显式 flag）。
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: orin-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:16686/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 9
      start_period: 10s
    restart: unless-stopped
    networks:
      - orin-network

  orin-frontend:
    image: orin-frontend:local
    container_name: orin-frontend
    build:
      context: ./orin-frontend
      dockerfile: Dockerfile
      target: runtime
    depends_on:
      orin-backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 9
      start_period: 10s
    restart: unless-stopped
    networks:
      - orin-network

volumes:
  orin-mysql-data:
    name: orin-mysql-data
  orin-redis-data:
    name: orin-redis-data
  orin-rabbitmq-data:
    name: orin-rabbitmq-data

networks:
  orin-network:
    name: orin-network
