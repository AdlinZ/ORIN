services:
  mysql:
    image: mysql:8.0.40
    container_name: orin-mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Copy .env.example to .env and set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?Copy .env.example to .env and set MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER:?Copy .env.example to .env and set MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Copy .env.example to .env and set MYSQL_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - orin-mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - orin-network

  redis:
    image: redis:7.4-alpine
    container_name: orin-redis
    env_file:
      - .env
    command: >
      sh -c 'redis-server
      --appendonly yes
      --requirepass "$${REDIS_PASSWORD}"'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Copy .env.example to .env and set REDIS_PASSWORD}
    volumes:
      - orin-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - orin-network

  orin-ai-engine:
    image: orin-ai-engine:local
    container_name: orin-ai-engine
    build:
      context: ./orin-ai-engine
      dockerfile: ../docker/Dockerfile.ai-engine
      target: runtime
    env_file:
      - .env
    environment:
      ORIN_BACKEND_URL: http://orin-backend:8080
      ORIN_REDIS_URL: redis://:${REDIS_PASSWORD:?Copy .env.example to .env and set REDIS_PASSWORD}@redis:6379/0
      ORIN_MQ_WORKER_DISABLED: "true"
      ORIN_MQ_WORKER_AUTO_START: "false"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${AI_ENGINE_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 9
      start_period: 20s
    restart: unless-stopped
    networks:
      - orin-network

  orin-backend:
    image: orin-backend:local
    container_name: orin-backend
    build:
      context: ./orin-backend
      dockerfile: ../docker/Dockerfile.backend
      target: runtime
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:?Copy .env.example to .env and set MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER:?Copy .env.example to .env and set MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD:?Copy .env.example to .env and set MYSQL_PASSWORD}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Copy .env.example to .env and set REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?Copy .env.example to .env and set JWT_SECRET}
      ORIN_SECURITY_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Copy .env.example to .env and set CORS_ALLOWED_ORIGINS}
      ORIN_AI_ENGINE_URL: http://orin-ai-engine:8000
      MILVUS_HOST: ${MILVUS_HOST:-localhost}
      MILVUS_PORT: ${MILVUS_PORT:-19530}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      ORIN_RABBITMQ_LISTENERS_AUTO_STARTUP: "false"
      COLLAB_LISTENERS_AUTO_STARTUP: "false"
      COLLAB_MODE: ${COLLAB_MODE:-JAVA_NATIVE}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 9
      start_period: 45s
    restart: unless-stopped
    networks:
      - orin-network

  orin-frontend:
    image: orin-frontend:local
    container_name: orin-frontend
    build:
      context: ./orin-frontend
      dockerfile: Dockerfile
      target: runtime
    depends_on:
      orin-backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 9
      start_period: 10s
    restart: unless-stopped
    networks:
      - orin-network

volumes:
  orin-mysql-data:
    name: orin-mysql-data
  orin-redis-data:
    name: orin-redis-data

networks:
  orin-network:
    name: orin-network
