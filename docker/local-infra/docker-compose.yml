services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    container_name: orin-etcd
    command:
      - etcd
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    restart: unless-stopped
    networks:
      - orin_local

  milvus-minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: orin-milvus-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MILVUS_MINIO_ACCESS_KEY:-milvusadmin}
      MINIO_ROOT_PASSWORD: ${MILVUS_MINIO_SECRET_KEY:-MilvusMinioChangeMe123!}
    volumes:
      - milvus_minio_data:/data
    restart: unless-stopped
    networks:
      - orin_local

  milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: orin-milvus
    command:
      - milvus
      - run
      - standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY_ID: ${MILVUS_MINIO_ACCESS_KEY:-milvusadmin}
      MINIO_SECRET_ACCESS_KEY: ${MILVUS_MINIO_SECRET_KEY:-MilvusMinioChangeMe123!}
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - milvus-minio
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_METRICS_PORT:-9091}:9091"
    restart: unless-stopped
    networks:
      - orin_local

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: orin-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    networks:
      - orin_local

  grafana:
    image: grafana/grafana:11.4.0
    container_name: orin-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-ChangeMeGrafana123!}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    restart: unless-stopped
    networks:
      - orin_local

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: orin-node-exporter
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    restart: unless-stopped
    networks:
      - orin_local

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.56.2
    container_name: orin-cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "${CADVISOR_PORT:-8081}:8080"
    restart: unless-stopped
    networks:
      - orin_local

  nvidia-node-exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.4.1
    container_name: orin-nvidia-node-exporter
    profiles: ["nvidia"]
    gpus: all
    command:
      - --web.listen-address=:9835
    ports:
      - "${NVIDIA_NODE_EXPORTER_PORT:-9835}:9835"
    restart: unless-stopped
    networks:
      - orin_local

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: orin-rabbitmq
    profiles: ["queue"]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-orin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-ChangeMeRabbitMQ123!}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-/orin}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    restart: unless-stopped
    networks:
      - orin_local

  neo4j:
    image: neo4j:5.26
    container_name: orin-neo4j
    profiles: ["graph"]
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/ChangeMeNeo4j123!}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INIT:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-2g}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    restart: unless-stopped
    networks:
      - orin_local

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: orin-minio
    profiles: ["objectstore"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-orinminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ChangeMeMinio123!}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    restart: unless-stopped
    networks:
      - orin_local

  langfuse-postgres:
    image: postgres:16
    container_name: orin-langfuse-postgres
    profiles: ["langfuse"]
    environment:
      POSTGRES_DB: ${LANGFUSE_POSTGRES_DB:-langfuse}
      POSTGRES_USER: ${LANGFUSE_POSTGRES_USER:-langfuse}
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:-ChangeMeLangfusePg123!}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - orin_local

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.12
    container_name: orin-langfuse-clickhouse
    profiles: ["langfuse"]
    environment:
      CLICKHOUSE_DB: ${LANGFUSE_CLICKHOUSE_DB:-default}
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-}
      TZ: UTC
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    ports:
      - "${LANGFUSE_CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${LANGFUSE_CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    restart: unless-stopped
    networks:
      - orin_local

  langfuse-redis:
    image: redis:7.4
    container_name: orin-langfuse-redis
    profiles: ["langfuse"]
    command: >
      sh -c 'redis-server
      --appendonly yes
      --requirepass "$${REDIS_PASSWORD}"'
    environment:
      REDIS_PASSWORD: ${LANGFUSE_REDIS_PASSWORD:-ChangeMeLangfuseRedis123!}
    volumes:
      - langfuse_redis_data:/data
    restart: unless-stopped
    networks:
      - orin_local

  langfuse-s3:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: orin-langfuse-s3
    profiles: ["langfuse"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_S3_ACCESS_KEY:-langfuse}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_S3_SECRET_KEY:-ChangeMeLangfuseS3123!}
    volumes:
      - langfuse_s3_data:/data
    restart: unless-stopped
    networks:
      - orin_local

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: orin-langfuse-web
    profiles: ["langfuse"]
    depends_on:
      - langfuse-postgres
      - langfuse-clickhouse
      - langfuse-redis
      - langfuse-s3
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${LANGFUSE_PUBLIC_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-ChangeThisNextAuthSecretAtLeast32Chars}
      SALT: ${LANGFUSE_SALT:-ChangeThisSaltAtLeast32CharsLong}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-ChangeThisEncryptionKeyAtLeast32Chars}
      TELEMETRY_ENABLED: "false"
      DATABASE_URL: postgresql://${LANGFUSE_POSTGRES_USER:-langfuse}:${LANGFUSE_POSTGRES_PASSWORD:-ChangeMeLangfusePg123!}@langfuse-postgres:5432/${LANGFUSE_POSTGRES_DB:-langfuse}
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-}
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${LANGFUSE_REDIS_PASSWORD:-ChangeMeLangfuseRedis123!}
      S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse}
      S3_EVENT_UPLOAD_REGION: ${LANGFUSE_S3_REGION:-us-east-1}
      S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_S3_ACCESS_KEY:-langfuse}
      S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_S3_SECRET_KEY:-ChangeMeLangfuseS3123!}
      S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-s3:9000
      S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      S3_MEDIA_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse}
      S3_MEDIA_UPLOAD_REGION: ${LANGFUSE_S3_REGION:-us-east-1}
      S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_S3_ACCESS_KEY:-langfuse}
      S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_S3_SECRET_KEY:-ChangeMeLangfuseS3123!}
      S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-s3:9000
      S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
    ports:
      - "${LANGFUSE_PORT:-3001}:3000"
    restart: unless-stopped
    networks:
      - orin_local

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: orin-langfuse-worker
    profiles: ["langfuse"]
    depends_on:
      - langfuse-postgres
      - langfuse-clickhouse
      - langfuse-redis
      - langfuse-s3
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${LANGFUSE_PUBLIC_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-ChangeThisNextAuthSecretAtLeast32Chars}
      SALT: ${LANGFUSE_SALT:-ChangeThisSaltAtLeast32CharsLong}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-ChangeThisEncryptionKeyAtLeast32Chars}
      TELEMETRY_ENABLED: "false"
      DATABASE_URL: postgresql://${LANGFUSE_POSTGRES_USER:-langfuse}:${LANGFUSE_POSTGRES_PASSWORD:-ChangeMeLangfusePg123!}@langfuse-postgres:5432/${LANGFUSE_POSTGRES_DB:-langfuse}
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-}
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${LANGFUSE_REDIS_PASSWORD:-ChangeMeLangfuseRedis123!}
      S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse}
      S3_EVENT_UPLOAD_REGION: ${LANGFUSE_S3_REGION:-us-east-1}
      S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_S3_ACCESS_KEY:-langfuse}
      S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_S3_SECRET_KEY:-ChangeMeLangfuseS3123!}
      S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-s3:9000
      S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      S3_MEDIA_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse}
      S3_MEDIA_UPLOAD_REGION: ${LANGFUSE_S3_REGION:-us-east-1}
      S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_S3_ACCESS_KEY:-langfuse}
      S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_S3_SECRET_KEY:-ChangeMeLangfuseS3123!}
      S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-s3:9000
      S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
    restart: unless-stopped
    networks:
      - orin_local

volumes:
  etcd_data:
  milvus_minio_data:
  milvus_data:
  prometheus_data:
  grafana_data:
  rabbitmq_data:
  neo4j_data:
  neo4j_logs:
  minio_data:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_redis_data:
  langfuse_s3_data:

networks:
  orin_local:
    name: orin_local
