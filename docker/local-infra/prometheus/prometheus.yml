global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: milvus
    static_configs:
      - targets:
          - milvus:9091

  - job_name: nvidia-node-exporter
    static_configs:
      - targets:
          - nvidia-node-exporter:9835
