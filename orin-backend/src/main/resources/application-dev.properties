# Development Environment Configuration
# This configuration is for local development only

# Database Configuration (Development - Required via environment variables)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate (Development - use update to auto-sync schema)
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Logging (Development - verbose logging)
logging.level.com.adlin.orin=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# Reduce noisy dependency reconnect logs in local dev
logging.level.org.springframework.amqp.rabbit.listener.SimpleMessageListenerContainer=ERROR
logging.level.org.springframework.amqp.rabbit.connection.CachingConnectionFactory=ERROR
logging.level.io.milvus.client.AbstractMilvusGrpcClient=ERROR

# Redis Configuration (Development - Required via environment variables)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0

# Dify Integration Configuration (Optional - via environment variables)
dify.api.timeout=${DIFY_API_TIMEOUT:120000}
dify.default.endpoint=${DIFY_DEFAULT_ENDPOINT:http://localhost:3000/v1}
dify.default.api-key=sk-dummy
dify.health.check.interval=${DIFY_HEALTH_CHECK_INTERVAL:60000}

# Hardware Monitor (Dev override)
# Disable local hardware scheduled collection to prevent auto-recreating "local" node.
orin.hardware.monitor.enabled=true

# JWT Configuration (Required - must be set via environment variables)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Rate Limiting (Development - more lenient)
rate.limit.requests=${RATE_LIMIT_REQUESTS:1000}
rate.limit.period=${RATE_LIMIT_PERIOD:60}

# Actuator Configuration (Development - expose all endpoints)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.loggers.enabled=true
management.endpoint.metrics.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.cache.instrument-cache=true
# Local dev can run without these optional services; do not fail /actuator/health
# when RabbitMQ or Neo4j are unavailable.
management.health.rabbit.enabled=false
management.health.neo4j.enabled=false

# Flyway Configuration (Development - disable validation to handle existing database)
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=false
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.ignore-ignored-migrations=false
spring.flyway.ignore-future-migrations=false
spring.flyway.clean-disabled=true
spring.flyway.fail-on-missing-locations=true

# RabbitMQ listeners are optional in local dev; enable them with ORIN_RABBITMQ_LISTENERS_AUTO_STARTUP=true.
orin.rabbitmq.listeners.auto-startup=${ORIN_RABBITMQ_LISTENERS_AUTO_STARTUP:false}
spring.rabbitmq.listener.simple.auto-startup=${ORIN_RABBITMQ_LISTENERS_AUTO_STARTUP:false}
spring.rabbitmq.listener.direct.auto-startup=${ORIN_RABBITMQ_LISTENERS_AUTO_STARTUP:false}
# In local dev, collaboration MQ listeners should follow env and default to enabled
orin.collaboration.listeners.auto-startup=${COLLAB_LISTENERS_AUTO_STARTUP:true}

# Milvus Configuration (Development - editable from the system settings page)
milvus.host=${MILVUS_HOST:localhost}
milvus.port=${MILVUS_PORT:19530}
milvus.token=${MILVUS_TOKEN:}

# SiliconFlow Configuration (Override defaults via environment variables)
siliconflow.api.key=${SILICONFLOW_API_KEY:-sk-dummy}
siliconflow.api.base-url=${SILICONFLOW_BASE_URL:https://api.siliconflow.cn/v1}

# Embedding Configuration
embedding.provider=siliconflow
embedding.model=${SILICONFLOW_EMBEDDING_MODEL:Qwen/Qwen3-Embedding-4B}

# Knowledge Rerank Configuration
knowledge.rerank.enabled=true
knowledge.rerank.model=${SILICONFLOW_RERANK_MODEL:Qwen/Qwen3-Reranker-8B}
storage.minio.bucket=${STORAGE_MINIO_BUCKET:orin-files}
storage.minio.secure=${STORAGE_MINIO_SECURE:false}
storage.minio.access-key=${STORAGE_MINIO_ACCESS_KEY:}
storage.write-async-repair=${STORAGE_WRITE_ASYNC_REPAIR:false}
storage.presign.ttl-seconds=${STORAGE_PRESIGN_TTL_SECONDS:600}
storage.minio.secret-key=${STORAGE_MINIO_SECRET_KEY:}
storage.primary=${STORAGE_PRIMARY:local}
storage.mode=${STORAGE_MODE:dual}
storage.minio.endpoint=${STORAGE_MINIO_ENDPOINT:http://localhost:9000}
storage.secondary=${STORAGE_SECONDARY:minio}
storage.read-fallback=${STORAGE_READ_FALLBACK:false}
jina.reader.api-key=
jina.reader.enabled=false
knowledge.ocr.provider=local
knowledge.asr.model=base
orin.collaboration.mq-for-parallel=true
orin.collaboration.mq-for-sequential=true
orin.collaboration.mode=LANGGRAPH_MQ
orin.collaboration.mq-for-consensus=true
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:orin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/orin}
