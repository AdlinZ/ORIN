# Development Environment Configuration
# This configuration is for local development only

# Database Configuration (Development - Required via environment variables)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate (Development - use update to auto-sync schema)
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Logging (Development - verbose logging)
logging.level.com.adlin.orin=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Redis Configuration (Development - Required via environment variables)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0

# Dify Integration Configuration (Optional - via environment variables)
dify.api.timeout=${DIFY_API_TIMEOUT:120000}
dify.default.endpoint=${DIFY_DEFAULT_ENDPOINT:http://localhost:3000/v1}
dify.default.api-key=sk-dummy
dify.health.check.interval=${DIFY_HEALTH_CHECK_INTERVAL:60000}

# Hardware Monitor (Dev override)
# Disable local hardware scheduled collection to prevent auto-recreating "local" node.
orin.hardware.monitor.enabled=true

# JWT Configuration (Required - must be set via environment variables)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Rate Limiting (Development - more lenient)
rate.limit.requests=${RATE_LIMIT_REQUESTS:1000}
rate.limit.period=${RATE_LIMIT_PERIOD:60}

# Actuator Configuration (Development - expose all endpoints)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.loggers.enabled=true
management.endpoint.metrics.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.cache.instrument-cache=true

# Flyway Configuration (Development - disable validation to handle existing database)
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=false
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.ignore-ignored-migrations=false
spring.flyway.ignore-future-migrations=false
spring.flyway.clean-disabled=true
spring.flyway.fail-on-missing-locations=true

# Milvus Configuration (Override defaults via environment variables)
milvus.host=192.168.1.164
milvus.port=19530
milvus.token=

# SiliconFlow Configuration (Override defaults via environment variables)
siliconflow.api.key=${SILICONFLOW_API_KEY:-sk-dummy}
siliconflow.api.base-url=${SILICONFLOW_BASE_URL:https://api.siliconflow.cn/v1}

# Embedding Configuration
embedding.provider=siliconflow
embedding.model=${SILICONFLOW_EMBEDDING_MODEL:Qwen/Qwen3-Embedding-4B}

# Knowledge Rerank Configuration
knowledge.rerank.enabled=true
knowledge.rerank.model=${SILICONFLOW_RERANK_MODEL:Qwen/Qwen3-Reranker-8B}
