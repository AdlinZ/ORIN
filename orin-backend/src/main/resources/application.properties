# ORIN Backend - Main Configuration
# This file contains common configuration shared across all environments
# Environment-specific settings are in application-{profile}.properties

spring.application.name=orin-backend

# Active Profile (default to dev, override with SPRING_PROFILES_ACTIVE env var)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Context Initializers (load .env file before Spring starts)
spring.context.initializers=com.adlin.orin.config.EnvFileLoader

# Server Configuration
server.port=${SERVER_PORT:8080}
server.tomcat.max-http-post-size=100MB

# Common JPA Settings
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Common Actuator Settings
management.server.port=${SERVER_PORT:8080}
management.metrics.export.prometheus.enabled=true

# Application Info
info.app.name=ORIN Backend
info.app.description=Advanced Agent Management & Monitoring System
info.app.version=1.0.0-SNAPSHOT

# Cache Configuration
spring.cache.type=redis
spring.data.redis.time-to-live=3600000
# Redis Connection (Required - must be set via environment variables)
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DB:0}

# Distributed Tracing Configuration
management.tracing.enabled=false
management.zipkin.tracing.enabled=false
management.tracing.sampling.probability=0.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Milvus Configuration (Required - must be set via environment variables)
milvus.host=${MILVUS_HOST}
milvus.port=${MILVUS_PORT:19530}
milvus.token=${MILVUS_TOKEN:}
milvus.collection.default=orin_default_collection

# Knowledge Base Storage Configuration
knowledge.storage.path=storage/knowledge
knowledge.storage.root=${KNOWLEDGE_STORAGE_ROOT:storage/knowledge}
knowledge.parsing.enabled=true
knowledge.parsing.max-concurrent=3
knowledge.parsing.retry-max=3
knowledge.chunk.size=500
knowledge.chunk.overlap=50

# OCR/ASR Configuration
ocr.provider=local
ocr.language=chi_sim+eng
asr.provider=local
asr.model=base

# Security Configuration
# CORS - comma-separated list of allowed origins (no wildcards in production)
# Example: https://example.com,https://app.example.com
# IMPORTANT: Must be explicitly configured in production environment
# For development, defaults to localhost:5173
orin.security.cors.allowed-origins=-

# Hardware Monitor Configuration
orin.hardware.monitor.enabled=true
orin.hardware.monitor.interval=60000

# Resilience4j Configuration
resilience4j.circuitbreaker.instances.siliconFlow.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.siliconFlow.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.siliconFlow.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.siliconFlow.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.siliconFlow.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.siliconFlow.sliding-window-size=10
resilience4j.circuitbreaker.instances.siliconFlow.sliding-window-type=COUNT_BASED

resilience4j.retry.instances.siliconFlow.max-attempts=3

# SiliconFlow Configuration (Required - must be set via environment variables)
siliconflow.api.key=${SILICONFLOW_API_KEY:-sk-dummy}
siliconflow.api.base-url=${SILICONFLOW_BASE_URL:https://api.siliconflow.cn/v1}
siliconflow.embedding.model=${SILICONFLOW_EMBEDDING_MODEL:BAAI/bge-m3}
siliconflow.vlm.model=${SILICONFLOW_VLM_MODEL:Qwen/Qwen2-VL-72B-Instruct}

# Multipart Configuration (Increase limits for Base64/Images)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# RAGFlow Configuration (Optional)
ragflow.default.endpoint=${RAGFLOW_DEFAULT_ENDPOINT:http://localhost:9380/v1}
ragflow.default.api-key=sk-dummy
ragflow.api.timeout=${RAGFLOW_API_TIMEOUT:60000}

# Jina Reader Configuration (Optional - for Web URL to Markdown conversion)
jina.reader.enabled=${JINA_READER_ENABLED:true}
jina.reader.api-key=sk-dummy

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
spring.rabbitmq.listener.simple.prefetch=${RABBITMQ_PREFETCH:10}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000

# Task Queue Configuration
orin.task.queue.name=${TASK_QUEUE_NAME:workflow-task-queue}
orin.task.exchange.name=${TASK_EXCHANGE_NAME:workflow-task-exchange}
orin.task.routing-key=${TASK_ROUTING_KEY:workflow.task}
orin.task.dlq.name=${TASK_DLQ_NAME:workflow-task-dlq}
orin.task.dlx.name=${TASK_DLX_NAME:workflow-task-dlx}
orin.task.priority.max=${TASK_PRIORITY_MAX:10}
orin.task.retry.max=${TASK_RETRY_MAX:3}
orin.task.retry.initial-interval=${TASK_RETRY_INITIAL_INTERVAL:1000}
orin.task.retry.multiplier=${TASK_RETRY_MULTIPLIER:2.0}
orin.task.retry.max-interval=${TASK_RETRY_MAX_INTERVAL:30000}

# Langfuse Configuration (for LLM Observability)
langfuse.enabled=${LANGFUSE_ENABLED:false}
langfuse.public-key=${LANGFUSE_PUBLIC_KEY:}
langfuse.secret-key=${LANGFUSE_SECRET_KEY:}
langfuse.host=${LANGFUSE_HOST:}

# System Basic Configuration (for BaseSettings page)
orin.system.name=${ORIN_SYSTEM_NAME:ORIN 系统}
orin.system.description=${ORIN_SYSTEM_DESCRIPTION:高级 Agent 管理系统}
orin.system.session-retention-days=${ORIN_SYSTEM_SESSION_RETENTION_DAYS:30}
orin.system.max-concurrent-requests=${ORIN_SYSTEM_MAX_CONCURRENT_REQUESTS:100}
orin.system.audit-log-enabled=${ORIN_SYSTEM_AUDIT_LOG_ENABLED:true}
orin.system.audit-log-retention-days=${ORIN_SYSTEM_AUDIT_LOG_RETENTION_DAYS:90}
