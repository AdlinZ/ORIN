# ORIN Backend - Main Configuration
# This file contains common configuration shared across all environments
# Environment-specific settings are in application-{profile}.properties

spring.application.name=orin-backend

# Active Profile (default to dev, override with SPRING_PROFILES_ACTIVE env var)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Context Initializers (load .env file before Spring starts)
spring.context.initializers=com.adlin.orin.config.EnvFileLoader

# Server Configuration
server.port=${SERVER_PORT:8080}
server.tomcat.max-http-post-size=100MB

# Common JPA Settings
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Common Actuator Settings
management.server.port=${SERVER_PORT:8080}
management.metrics.export.prometheus.enabled=true

# Application Info
info.app.name=ORIN Backend
info.app.description=Advanced Agent Management & Monitoring System
info.app.version=1.0.0-SNAPSHOT

# Cache Configuration
spring.cache.type=redis
spring.data.redis.time-to-live=3600000
# Redis Connection (Required - must be set via environment variables)
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DB:0}

# Distributed Tracing Configuration
management.tracing.enabled=false
management.zipkin.tracing.enabled=false
management.tracing.sampling.probability=0.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Milvus Configuration (Required - must be set via environment variables)
milvus.host=${MILVUS_HOST}
milvus.port=${MILVUS_PORT:19530}
milvus.token=${MILVUS_TOKEN:}
milvus.collection.default=orin_default_collection
milvus.client.connect-timeout-ms=${MILVUS_CLIENT_CONNECT_TIMEOUT_MS:5000}
milvus.client.keepalive-timeout-ms=${MILVUS_CLIENT_KEEPALIVE_TIMEOUT_MS:10000}
milvus.client.rpc-deadline-ms=${MILVUS_CLIENT_RPC_DEADLINE_MS:10000}
milvus.client.max-retry-times=${MILVUS_CLIENT_MAX_RETRY_TIMES:2}
milvus.client.retry-interval-ms=${MILVUS_CLIENT_RETRY_INTERVAL_MS:500}

# Knowledge Base Storage Configuration
knowledge.storage.path=storage/knowledge
knowledge.storage.root=${KNOWLEDGE_STORAGE_ROOT:storage/knowledge}
knowledge.parsing.enabled=true
knowledge.parsing.max-concurrent=3
knowledge.parsing.retry-max=3
knowledge.chunk.size=500
knowledge.chunk.overlap=50

# Object Storage (Dual backend)
storage.mode=${STORAGE_MODE:dual}
storage.primary=${STORAGE_PRIMARY:local}
storage.secondary=${STORAGE_SECONDARY:minio}
storage.read-fallback=${STORAGE_READ_FALLBACK:true}
storage.write-async-repair=${STORAGE_WRITE_ASYNC_REPAIR:true}
storage.presign-ttl-seconds=${STORAGE_PRESIGN_TTL_SECONDS:600}
storage.local.root=${STORAGE_LOCAL_ROOT:storage/uploads}
storage.minio.endpoint=${STORAGE_MINIO_ENDPOINT:http://localhost:9000}
storage.minio.access-key=${STORAGE_MINIO_ACCESS_KEY:}
storage.minio.secret-key=${STORAGE_MINIO_SECRET_KEY:}
storage.minio.bucket=${STORAGE_MINIO_BUCKET:orin-files}
storage.minio.secure=${STORAGE_MINIO_SECURE:false}
storage.repair.enabled=${STORAGE_REPAIR_ENABLED:true}
storage.repair.max-retries=${STORAGE_REPAIR_MAX_RETRIES:8}
storage.repair.fixed-delay-ms=${STORAGE_REPAIR_FIXED_DELAY_MS:30000}

# OCR/ASR Configuration
ocr.provider=local
ocr.language=chi_sim+eng
asr.provider=local
asr.model=base

# Security Configuration
# CORS - comma-separated list of allowed origins (no wildcards in production)
# Example: https://example.com,https://app.example.com
# IMPORTANT: Must be explicitly configured in production environment
# For development, defaults to localhost:5173
orin.security.cors.allowed-origins=http://localhost:5173

# Hardware Monitor Configuration
orin.hardware.monitor.enabled=true
orin.hardware.monitor.interval=60000

# Resilience4j Configuration
resilience4j.circuitbreaker.instances.siliconFlow.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.siliconFlow.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.siliconFlow.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.siliconFlow.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.siliconFlow.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.siliconFlow.sliding-window-size=10
resilience4j.circuitbreaker.instances.siliconFlow.sliding-window-type=COUNT_BASED

resilience4j.retry.instances.siliconFlow.max-attempts=3

# SiliconFlow Configuration (Required - must be set via environment variables)
siliconflow.api.key=${SILICONFLOW_API_KEY:-sk-dummy}
siliconflow.api.base-url=${SILICONFLOW_BASE_URL:https://api.siliconflow.cn/v1}
siliconflow.embedding.model=${SILICONFLOW_EMBEDDING_MODEL:BAAI/bge-m3}
siliconflow.vlm.model=${SILICONFLOW_VLM_MODEL:Qwen/Qwen2-VL-72B-Instruct}

# Multipart Configuration (Increase limits for Base64/Images)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# RAGFlow Configuration (Optional)
ragflow.default.endpoint=${RAGFLOW_DEFAULT_ENDPOINT:http://localhost:9380/v1}
ragflow.default.api-key=sk-dummy
ragflow.api.timeout=${RAGFLOW_API_TIMEOUT:60000}

# Jina Reader Configuration (Optional - for Web URL to Markdown conversion)
jina.reader.enabled=${JINA_READER_ENABLED:true}
jina.reader.api-key=sk-dummy

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
spring.rabbitmq.listener.simple.prefetch=${RABBITMQ_PREFETCH:10}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000

# Optional: disable RabbitMQ listeners in environments where broker is not available
orin.rabbitmq.listeners.auto-startup=${ORIN_RABBITMQ_LISTENERS_AUTO_STARTUP:true}

# Health check log strategy (true = log only when dependency health state changes)
orin.healthcheck.log-state-change-only=${ORIN_HEALTHCHECK_LOG_STATE_CHANGE_ONLY:true}

# Task Queue Configuration
orin.task.queue.name=${TASK_QUEUE_NAME:workflow-task-queue}
orin.task.exchange.name=${TASK_EXCHANGE_NAME:workflow-task-exchange}
orin.task.routing-key=${TASK_ROUTING_KEY:workflow.task}
orin.task.dlq.name=${TASK_DLQ_NAME:workflow-task-dlq}
orin.task.dlx.name=${TASK_DLX_NAME:workflow-task-dlx}
orin.task.priority.max=${TASK_PRIORITY_MAX:10}
orin.task.retry.max=${TASK_RETRY_MAX:3}
orin.task.retry.initial-interval=${TASK_RETRY_INITIAL_INTERVAL:1000}
orin.task.retry.multiplier=${TASK_RETRY_MULTIPLIER:2.0}
orin.task.retry.max-interval=${TASK_RETRY_MAX_INTERVAL:30000}

# Collaboration MQ Configuration
orin.ai-engine.url=${ORIN_AI_ENGINE_URL:http://127.0.0.1:8000}
orin.playground.runtime.connect-timeout-ms=${ORIN_PLAYGROUND_RUNTIME_CONNECT_TIMEOUT_MS:5000}
orin.playground.runtime.read-timeout-ms=${ORIN_PLAYGROUND_RUNTIME_READ_TIMEOUT_MS:420000}
orin.collaboration.mode=${COLLAB_MODE:LANGGRAPH_MQ}
orin.collaboration.exchange.name=${COLLAB_EXCHANGE_NAME:collaboration-task-exchange}
orin.collaboration.queue.name=${COLLAB_QUEUE_NAME:collaboration-task-queue}
orin.collaboration.routing-key=${COLLAB_ROUTING_KEY:collaboration.task}
orin.collaboration.dlq.name=${COLLAB_DLQ_NAME:collaboration-task-dlq}
orin.collaboration.dlx.name=${COLLAB_DLX_NAME:collaboration-task-dlx}
orin.collaboration.reply.exchange=${COLLAB_REPLY_EXCHANGE:collaboration-reply-exchange}
orin.collaboration.result.queue=${COLLAB_RESULT_QUEUE:collaboration-task-result-queue}
orin.collaboration.reply.routing-key=${COLLAB_REPLY_ROUTING_KEY:collaboration.task.result}
orin.collaboration.queue.ttl=${COLLAB_QUEUE_TTL:300000}
orin.collaboration.mq-for-parallel=${COLLAB_MQ_FOR_PARALLEL:true}
orin.collaboration.mq-for-sequential=${COLLAB_MQ_FOR_SEQUENTIAL:true}
orin.collaboration.mq-for-consensus=${COLLAB_MQ_FOR_CONSENSUS:true}
orin.collaboration.listeners.auto-startup=${COLLAB_LISTENERS_AUTO_STARTUP:true}

# Main Agent Selection Configuration
collab.main_agent.static_default=${COLLAB_MAIN_AGENT_STATIC_DEFAULT:}
collab.main_agent.bid_whitelist=${COLLAB_MAIN_AGENT_BID_WHITELIST:}
collab.main_agent.bid_weights.reasoning=${COLLAB_MAIN_AGENT_WEIGHT_REASONING:0.6}
collab.main_agent.bid_weights.speed=${COLLAB_MAIN_AGENT_WEIGHT_SPEED:0.3}
collab.main_agent.bid_weights.cost=${COLLAB_MAIN_AGENT_WEIGHT_COST:0.1}
orin.collab.metrics.alert.success-rate.warn=${COLLAB_METRICS_SUCCESS_WARN:0.85}
orin.collab.metrics.alert.success-rate.critical=${COLLAB_METRICS_SUCCESS_CRITICAL:0.70}
orin.collab.metrics.alert.p95-ms.warn=${COLLAB_METRICS_P95_WARN_MS:20000}
orin.collab.metrics.alert.p95-ms.critical=${COLLAB_METRICS_P95_CRITICAL_MS:60000}
orin.collab.metrics.alert.dlq.warn=${COLLAB_METRICS_DLQ_WARN:1}
orin.collab.metrics.alert.dlq.critical=${COLLAB_METRICS_DLQ_CRITICAL:20}
orin.collab.metrics.alert.bidding-success.warn=${COLLAB_METRICS_BID_SUCCESS_WARN:0.70}
orin.collab.metrics.alert.bidding-success.critical=${COLLAB_METRICS_BID_SUCCESS_CRITICAL:0.50}
orin.collab.metrics.alert.avg-critique.warn=${COLLAB_METRICS_CRITIQUE_WARN:2.5}
orin.collab.metrics.alert.avg-critique.critical=${COLLAB_METRICS_CRITIQUE_CRITICAL:3.5}
orin.collab.metrics.alert.scheduler.enabled=${COLLAB_METRICS_ALERT_SCHEDULER_ENABLED:true}
orin.collab.metrics.alert.scheduler.window-hours=${COLLAB_METRICS_ALERT_WINDOW_HOURS:24}
orin.collab.metrics.alert.scheduler.red-consecutive-threshold=${COLLAB_METRICS_ALERT_RED_CONSECUTIVE:5}
orin.collab.metrics.alert.scheduler.cooldown-seconds=${COLLAB_METRICS_ALERT_COOLDOWN_SECONDS:900}
orin.collab.metrics.alert.scheduler.fixed-delay-ms=${COLLAB_METRICS_ALERT_FIXED_DELAY_MS:60000}
orin.collab.alert.rule.bootstrap.enabled=${COLLAB_ALERT_RULE_BOOTSTRAP_ENABLED:true}
orin.collab.alert.rule.name=${COLLAB_ALERT_RULE_NAME:协作健康告警规则}
orin.collab.alert.rule.severity=${COLLAB_ALERT_RULE_SEVERITY:CRITICAL}
orin.collab.alert.rule.channels=${COLLAB_ALERT_RULE_CHANNELS:}
orin.collab.alert.rule.recipients=${COLLAB_ALERT_RULE_RECIPIENTS:}
orin.collab.alert.rule.cooldown-minutes=${COLLAB_ALERT_RULE_COOLDOWN_MINUTES:15}

# Langfuse Configuration (for LLM Observability)
langfuse.enabled=${LANGFUSE_ENABLED:false}
langfuse.public-key=${LANGFUSE_PUBLIC_KEY:}
langfuse.secret-key=${LANGFUSE_SECRET_KEY:}
langfuse.host=${LANGFUSE_HOST:}

# Neo4j Configuration (for Knowledge Graph)
neo4j.uri=${NEO4J_URI:}
neo4j.host=${NEO4J_HOST:localhost}
neo4j.port=${NEO4J_PORT:7687}
neo4j.username=${NEO4J_USERNAME:neo4j}
neo4j.password=${NEO4J_PASSWORD:}
neo4j.database=${NEO4J_DATABASE:neo4j}
neo4j.max-connection-pool-size=${NEO4J_MAX_CONNECTION_POOL_SIZE:50}
neo4j.connection-acquisition-timeout-ms=${NEO4J_CONNECTION_ACQUISITION_TIMEOUT_MS:60000}

# System Basic Configuration (for BaseSettings page)
orin.system.name=${ORIN_SYSTEM_NAME:ORIN 系统}
orin.system.description=${ORIN_SYSTEM_DESCRIPTION:高级 Agent 管理系统}
orin.system.session-retention-days=${ORIN_SYSTEM_SESSION_RETENTION_DAYS:30}
orin.system.max-concurrent-requests=${ORIN_SYSTEM_MAX_CONCURRENT_REQUESTS:100}
orin.system.audit-log-enabled=${ORIN_SYSTEM_AUDIT_LOG_ENABLED:true}
orin.system.audit-log-retention-days=${ORIN_SYSTEM_AUDIT_LOG_RETENTION_DAYS:90}
