version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/orin-backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3

  - package-ecosystem: "npm"
    directory: "/orin-frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:20"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3

  - package-ecosystem: "pip"
    directory: "/orin-ai-engine"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:40"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
