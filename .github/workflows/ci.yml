name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ==================== 后端检查 ====================
  backend:
    name: Backend (Java 17 + Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orin-backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: orin_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Backend compile
        run: mvn compile -q

      - name: Backend core tests (F1.x regression)
        run: |
          mvn test -q \
            -Dtest="ErrorCodeTest,ResultTest,BusinessExceptionTest,GlobalExceptionHandlerTest,KnowledgeGraphServiceTest,CollaborationServiceUnitTest,WorkflowServiceTest,AgentSmokeTest" \
            -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:mysql://localhost:3306/orin_test \
            -Dspring.datasource.username=root \
            -Dspring.datasource.password=root

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: orin-backend/target/surefire-reports/*.txt
          retention-days: 7

  # ==================== 前端检查 ====================
  frontend:
    name: Frontend (Node.js 18 + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orin-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: orin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint

      - name: Frontend build
        run: npm run build

      - name: Upload lint reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-lint-reports
          path: orin-frontend/eslint-reports/*.html
          retention-days: 7

  # ==================== AI 引擎检查 ====================
  ai-engine:
    name: AI Engine (Python 3.11 + FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orin-ai-engine

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: orin-ai-engine/pyproject.toml

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root

      - name: Python syntax check
        run: python3 -m py_compile app/main.py

      - name: AI Engine tests
        run: poetry run pytest tests/ -v --tb=short

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ai-engine-test-reports
          path: orin-ai-engine/.pytest_cache
          retention-days: 7

  # ==================== 最小组合门禁 ====================
  # 此 job 确保 PR 必须通过所有三端检查才能合并
  gate:
    name: CI Gate
    needs: [backend, frontend, ai-engine]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "所有检查通过 ✅ PR 可以合并"
