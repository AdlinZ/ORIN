name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-baseline:
    name: Schema Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check schema snapshot baseline
        run: bash scripts/check-schema-baseline.sh

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orin-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Test
        run: mvn -B test

      - name: Coverage summary
        run: python ../scripts/coverage-summary.py backend target/site/jacoco/jacoco.xml >> "$GITHUB_STEP_SUMMARY"

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: orin-backend/target/surefire-reports/
          retention-days: 14

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            orin-backend/target/site/jacoco/
            orin-backend/target/jacoco.exec
          retention-days: 14

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orin-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: orin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Coverage summary
        run: python ../scripts/coverage-summary.py frontend coverage/coverage-summary.json >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        run: npm run build

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: orin-frontend/coverage/
          retention-days: 14

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: orin-frontend/dist/
          retention-days: 14

  ai-engine:
    name: AI Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orin-ai-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: orin-ai-engine/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio pytest-cov==5.0.0

      - name: Compile
        run: python -m compileall app tests

      - name: Test with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Coverage summary
        run: python ../scripts/coverage-summary.py ai-engine coverage.xml >> "$GITHUB_STEP_SUMMARY"

      - name: Upload AI Engine coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-engine-coverage
          path: orin-ai-engine/coverage.xml
          retention-days: 14
