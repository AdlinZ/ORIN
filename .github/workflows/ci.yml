name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orin-backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: orin_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Lint / compile
        run: mvn -B -DskipTests compile

      - name: Test
        run: mvn -B test

      - name: Generate JaCoCo report
        run: mvn -B jacoco:report

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: orin-backend/target/surefire-reports/
          retention-days: 14

      - name: Upload backend coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-xml
          path: orin-backend/target/site/jacoco/jacoco.xml
          retention-days: 14

      - name: Upload backend coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-html
          path: orin-backend/target/site/jacoco/
          retention-days: 14

      - name: Comment backend coverage
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: ${{ github.workspace }}/orin-backend/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Backend JaCoCo Coverage
          update-comment: true
          min-coverage-overall: 0
          min-coverage-changed-files: 0

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orin-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: orin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: orin-frontend/coverage/
          retention-days: 14

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: orin-frontend/dist/
          retention-days: 14

      - name: Comment frontend coverage
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: orin-frontend

  ai-engine:
    name: AI Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orin-ai-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: orin-ai-engine/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio pytest-cov==5.0.0

      - name: Lint
        run: python -m compileall app tests

      - name: Test with coverage
        run: |
          pytest --junitxml=pytest.xml --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml | tee pytest-coverage.txt

      - name: Upload AI Engine coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-engine-coverage
          path: |
            orin-ai-engine/coverage.xml
            orin-ai-engine/pytest.xml
            orin-ai-engine/pytest-coverage.txt
          retention-days: 14

      - name: Upload AI Engine pytest cache
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ai-engine-pytest-cache
          path: orin-ai-engine/.pytest_cache/
          retention-days: 14

      - name: Comment AI Engine coverage
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@v1
        with:
          pytest-coverage-path: orin-ai-engine/pytest-coverage.txt
          junitxml-path: orin-ai-engine/pytest.xml
