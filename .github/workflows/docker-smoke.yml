name: Docker Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-smoke:
    name: Docker Quickstart Runtime Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker versions
        run: |
          docker version
          docker compose version

      - name: Run Docker quickstart smoke
        env:
          DOCKER_SMOKE_ENV_FILE: .env.example
          DOCKER_SMOKE_CLEANUP: "1"
        run: bash scripts/docker-smoke.sh

      - name: Upload Docker diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-smoke-diagnostics-${{ github.run_id }}
          path: |
            docker-compose.yml
            docker-compose.dev.yml
            docker/mysql/init/01-orin-schema.sql
          retention-days: 14
